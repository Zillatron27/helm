<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helm — Galaxy Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary, #0a0a0a); }
      #app { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Bridge bootstrap — synchronous, runs before the module bundle loads.
      // Extension content script (document_start) can post helm-extension-hello
      // before initBridge() attaches its listener; without this buffer, the
      // hello is dropped and handshake never completes. See src/data/bridge.ts.
      // Inbound type list is duplicated from bridge.ts INBOUND_TYPES — keep in sync.
      (function () {
        console.log("[Helm Bootstrap] inline script running, attaching capture listener");
        var INBOUND = { "helm-extension-hello": 1, "helm-init": 1, "helm-update": 1 };
        var queue = [];
        function capture(ev) {
          var d = ev && ev.data;
          if (!d || typeof d !== "object") return;
          if (!INBOUND[d.type]) return;
          console.log("[Helm Bootstrap] captured", d.type, "source===window:", ev.source === window, "origin:", ev.origin);
          queue.push(ev);
        }
        window.addEventListener("message", capture);
        window.__helmBridgeBootstrap = {
          drain: function () {
            window.removeEventListener("message", capture);
            var out = queue;
            queue = [];
            console.log("[Helm Bootstrap] drain returning", out.length, "events");
            return out;
          },
        };
        // Signal to the Helm Extension content script that this page is
        // ready to receive window.postMessage traffic. The content script
        // may have been holding envelopes (hello/init) that arrived via
        // runtime IPC before the HTML parser reached this script tag.
        // Dispatching synchronously after attaching `capture` guarantees the
        // capture listener is live before any queued envelope is delivered.
        console.log("[Helm Bootstrap] dispatching helm-bridge-page-ready");
        window.dispatchEvent(new Event("helm-bridge-page-ready"));
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
